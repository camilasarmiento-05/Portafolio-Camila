<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tarjeta de Producto</title>

<style>
body{
    background-color:#f4f4f4;
    text-align:center;
}

.tarjeta{
    width:350px;
    border-radius:10px;
    background:white;
    padding:80px ;
}

.tarjeta img{
    width:100%;
    border-radius:8px;
    
}


.nombre{
    font-size:25px;
    margin:10px 0;
}


.precio{
    color:green;
    font-size:18px;
    margin:5px 0;
}

.parrafo{
   
    font-size:20px;
    margin:14px 0;
}

.boton{
    background-color:#155a1e;
    color:white;
    padding:20px;
    border-radius:5px;
    font-size:20px;
}
.btn-volver{
         background-color: #155a1e;
          color: white;
          padding: 10px 12px;
         border-radius: 5px;
         
        }

.cont_boton{
    margin-top: 30px;
    text-align: left;
}



</style>

</head>
<body>

<div class="tarjeta">
    <img src="https://carulla.vtexassets.com/arquivos/ids/21654817/Mr-Tea-Pet-Limon-500-ml-397898_a.jpg?v=638859452369670000" alt="Producto">
    
    <h2 class="nombre">Mr Tea limón</h2>
    
    <p class="precio">$2.500</p>
    
    <p class="parrafo">
        Es una refrescante bebida de té lista para consumir, caracterizada por su sabor cítrico natural y bajo aporte calórico
    </p>
    
    <button class="boton">Comprar</button>
</div>
<div class="cont_boton">

    <a href="../index.html" class="btn-volver">Volver</a>
</div>

</body>
</html>
